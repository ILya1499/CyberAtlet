    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/EDbutton.css">
</head>
<body>

    <header>
        <h1>Экзоскелет: управление и мониторинг</h1>
        <nav>
            <button 
                class="btn" 
                {% if request.url.path == '/' %}disabled{% else %}onclick="location.href='/'"{% endif %}>
                Main page
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/control' %}disabled{% else %}onclick="location.href='/control'"{% endif %}>
                Control motors
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/history' %}disabled{% else %}onclick="location.href='/history'"{% endif %}>
                View History
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/status' %}disabled{% else %}onclick="location.href='/status'"{% endif %}>
                Server status
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/powerSaving' %}disabled{% else %}onclick="location.href='/powerSaving'"{% endif %}>
                Power saving
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/mode' %}disabled{% else %}onclick="location.href='/mode'"{% endif %}>
                Modes
            </button>
        </nav>
    </header>

    <main>
        <!-- Live-статус -->
        <section id="status-panel">
            <div class="chart-container">
                <div class="chart-header">
                    <h2>Текущее состояние</h2>
                </div>
                <div class="status-rows">
                    <div class="status-row">
                        <span class="param">ESP32 подключён:</span>
                        <span class="value" id="esp32-status">Нет</span>
                    </div>
                    <div class="status-row">
                        <span class="param">Левый угол:</span>
                        <span class="value" id="angle-left">0.0°</span>
                    </div>
                    <div class="status-row">
                        <span class="param">Правый угол:</span>
                        <span class="value" id="angle-right">0.0°</span>
                    </div>
                    <div class="status-row">
                        <span class="param">Напряжение АКБ:</span>
                        <span class="value" id="battery">0.0 В</span>
                    </div>
                    <div class="status-row">
                        <span class="param">Запись активна:</span>
                        <span class="value" id="recording-status">Нет</span>
                    </div>
                    <div class="status-row">
                        <span class="param">Последнее обновление:</span>
                        <span class="value" id="last-update">—</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Управление записью -->
        <section id="control-panel">
            <h2>Управление записью</h2>
            <button id="record-btn" class="btn primary">Start recording</button>
            <button id="stop-btn" class="btn secondary" disabled>Stop recording</button>
        </section>

        <!-- Быстрая загрузка -->
        <!--section id="upload-section">
            <h2>Загрузить данные</h2>
            <form id="upload-form" enctype="multipart/form-data">
                <input type="file" name="file" accept=".bin,.csv" required>
                <select name="file_type">
                    <option value="bin">Бинарный (.bin)</option>
                    <option value="csv">CSV</option>
                </select>
                <button type="submit" class="btn">Загрузить</button>
            </form>
            <p id="upload-result"></p>
        </section-->
    </main>

    <footer>
        <p>Сервер управления моторами | {{ "Запись активна" if is_recording else "Ожидание" }}</p>
    </footer>

    <script>
        // Подключение к WebSocket
        //const ws = new WebSocket(`ws://${window.location.host}/ws`);
        const ws = new WebSocket(`ws://95.163.230.7:8000/ws`);

        ws.onmessage = function(event) {
            const msg = JSON.parse(event.data);
            if (msg.type === "status") {
                const s = msg.data;
                document.getElementById("angle-left").textContent = s.angle_left.toFixed(2) + "°";
                document.getElementById("angle-right").textContent = s.angle_right.toFixed(2) + "°";
                document.getElementById("battery").textContent = s.battery_voltage.toFixed(2) + " В";
                //updateIndicator("esp32-status", s.esp32_connected);
                //updateIndicator("recording-status", s.recording);
                document.getElementById("esp32-status").textContent = s.esp32_connected ? "Да" : "Нет";
                document.getElementById("recording-status").textContent = s.recording ? "Да" : "Нет";
                document.getElementById("last-update").textContent = s.last_update ? new Date(s.last_update).toLocaleTimeString() : "—";

                // Обновление кнопок
                const recordBtn = document.getElementById("record-btn");
                const stopBtn = document.getElementById("stop-btn");
                if (s.recording) {
                    recordBtn.disabled = true;
                    stopBtn.disabled = false;
                    recordBtn.textContent = "Recording...";
                } else {
                    recordBtn.disabled = false;
                    stopBtn.disabled = true;
                    recordBtn.textContent = "Start recording";
                }
            }
        };

        function updateIndicator(id, isActive) {
            const el = document.getElementById(id);
            el.className = "status-indicator " + (isActive ? "online" : "offline");
            el.textContent = isActive ? "Да" : "Нет";
        }

        // Управление записью
        document.getElementById("record-btn").onclick = async () => {
            const res = await fetch("/start_recording", { method: "POST" });
            if (!res.ok) alert("Ошибка запуска записи");
        };

        document.getElementById("stop-btn").onclick = async () => {
            const res = await fetch("/stop_recording", { method: "POST" });
            if (!res.ok) alert("Ошибка остановки записи");
        };

        // Загрузка файла
        document.getElementById("upload-form").onsubmit = async (e) => {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);
            const res = await fetch("/upload_data_file", {
                method: "POST",
                body: formData
            });
            const result = await res.json();
            const msg = document.getElementById("upload-result");
            if (res.ok) {
                msg.style.color = "green";
                msg.textContent = `Файл загружен: ${result.filename}`;
            } else {
                msg.style.color = "red";
                msg.textContent = `Ошибка: ${result.detail || "Неизвестно"}`;
            }
        };
    </script>
</body>
</html>
