<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Control Panel</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/static/EDbutton.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1"></script>
</head>
<body>
    <button class="theme-switcher" onclick="toggleTheme()">
        <i class="fas fa-moon"></i> <!-- Луна для темной темы -->
    </button>

    <button class="floating-button" onclick="scrollToTop()">
        <i class="fas fa-arrow-up"></i> <!-- Стрелка вверх -->
    </button>

    <h1>Motor Control Panel</h1>
    <nav>
        <button 
            class="btn" 
            {% if request.url.path == '/' %}disabled{% else %}onclick="location.href='/'"{% endif %}>
            Main page
        </button>
        <button 
            class="btn" 
            {% if request.url.path == '/control' %}disabled{% else %}onclick="location.href='/control'"{% endif %}>
        Control motors
        </button>
        <button 
            class="btn" 
            {% if request.url.path == '/history' %}disabled{% else %}onclick="location.href='/history'"{% endif %}>
            View History
        </button>
        <button 
            class="btn" 
            {% if request.url.path == '/status' %}disabled{% else %}onclick="location.href='/status'"{% endif %}>
            Server status
        </button>
        <button 
            class="btn" 
            {% if request.url.path == '/powerSaving' %}disabled{% else %}onclick="location.href='/powerSaving'"{% endif %}>                Power saving
        </button>
        <button
            class="btn" 
            {% if request.url.path == '/mode' %}disabled{% else %}onclick="location.href='/mode'"{% endif %}>
            Modes
        </button>
    </nav>
    <div class="selection-controls">
    <button id="startSelection" class="btn">
        <i class="fas fa-vector-square"></i> Select Area
    </button>
    <button id="clearSelection" class="btn">
        <i class="fas fa-times"></i> Clear
    </button>
    <small class="hint">(Drag on chart to select area)</small>
</div>
    <div class="control-buttons">
        <button id="record-btn" onclick="toggleRecording()" class="btn">Start Recording</button>
    </div>

    <div class="current-file" id="current-file">
        No file loaded
    </div>

    <div class="time-controls">
        <label>
            Time Window (ms):
            <input type="range" id="timeRange" min="100" max="5000" value="1000" step="100">
            <span id="timeWindowValue">1000</span>
        </label>
        <button onclick="zoomToFit()" class="btn">Zoom to Fit</button>
    </div>

    <div class="chart-controls">
        <button onclick="resetZoom()" class="btn">Reset Zoom</button>
        <button onclick="zoomIn()" class="btn">Zoom In (+)</button>
        <button onclick="zoomOut()" class="btn">Zoom Out (-)</button>
        <button onclick="panLeft()" class="btn">← Pan Left</button>
        <button onclick="panRight()" class="btn">Pan Right →</button>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title">Motor Angles</div>
            <div class="chart-toggle">
                <button id="toggleLeftAngle" class="active" onclick="toggleDataset('angle', 0)">Left</button>
                <button id="toggleRightAngle" class="active" onclick="toggleDataset('angle', 1)">Right</button>
            </div>
        </div>
        <canvas id="angles-chart"></canvas>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title">Motor Speeds</div>
            <div class="chart-toggle">
                <button id="toggleLeftSpeed" class="active" onclick="toggleDataset('speed', 0)">Left Raw</button>
                <button id="toggleRightSpeed" class="active" onclick="toggleDataset('speed', 1)">Right Raw</button>
                <button id="toggleLeftFiltered" class="active" onclick="toggleDataset('speed', 2)">Left Filtered</button>
                <button id="toggleRightFiltered" class="active" onclick="toggleDataset('speed', 3)">Right Filtered</button>
            </div>
        </div>
        <canvas id="speed-chart"></canvas>
    </div>

    <div class="chart-container">
        <div class="chart-header">
            <div class="chart-title">Motor Torque</div>
            <div class="chart-toggle">
                <button id="toggleLeftTorque" class="active" onclick="toggleDataset('torque', 0)">Left</button>
                <button id="toggleRightTorque" class="active" onclick="toggleDataset('torque', 1)">Right</button>
            </div>
        </div>
        <canvas id="torque-chart"></canvas>
    </div>

    <div class="upload-section">
        <h3>Upload Data File</h3>
        <form id="uploadForm" enctype="multipart/form-data">
            <input type="file" id="dataFile" name="file" accept=".bin,.csv" style="margin-bottom:10px;display:block;">
            <select id="fileType" style="padding:5px;margin-right:10px;">
                <option value="bin">Binary (.bin)</option>
                <option value="csv">CSV (.csv)</option>
            </select>
            <button type="button" onclick="uploadDataFile()" class="btn">Upload</button>
        </form>
        <div id="uploadStatus"></div>
    </div>

    <script>
        function toggleTheme() {
            document.documentElement.setAttribute(
                'data-theme',
                document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'
            );
        }

        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Константы
        const TIME_STEP = 5;
        const Y_MIN = 0;
        const Y_MAX = 180;
        let timeWindow = 1000;
        let angleChart, speedChart, torqueChart;
        let isRecording = false;
        let maxDataTime = 0;
        let isSelecting = false;
        let selectionStart = null;
        let selectionEnd = null;

        // Инициализация всех графиков
        function initChart() {
            const angleCtx = document.getElementById('angles-chart').getContext('2d');
            const speedCtx = document.getElementById('speed-chart').getContext('2d');
            const torqueCtx = document.getElementById('torque-chart').getContext('2d');

            // Общие настройки для всех графиков
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                animation: { duration: 0 },
                plugins: {
                    legend: {
                        position: 'top',
                    },
                    zoom: {
                        pan: {
                            enabled: true,
                            mode: 'x',
                            modifierKey: 'ctrl',
                            onPanComplete: ({chart}) => syncChartsZoom()
                        },
                        zoom: {
                            wheel: { enabled: true, speed: 0.1 },
                            pinch: { enabled: true },
                            drag: { enabled: true, modifierKey: 'shift' },
                            mode: 'x',
                            onZoomComplete: ({chart}) => syncChartsZoom()
                        }
                    }
                },
                scales: {
                    x: {
                        type: 'linear',
                        position: 'bottom',
                        title: {
                            display: true,
                            text: 'Time (ms)',
                            font: {
                                weight: 'bold'
                            }
                        },
                        min: 0,
                        max: timeWindow,
                        grid: {
                            color: 'rgba(0, 0, 0, 0.1)',
                            drawOnChartArea: true
                        }
                    },
                    y: {
                        title: {
                            display: true,
                            font: {
                                weight: 'bold'
                            }
                        },
                        grid: {
                            color: 'rgba(0, 0, 0, 0.05)'
                        }
                    }
                }
            };

            // График углов
            angleChart = new Chart(angleCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Left Motor Angle',
                            data: [],
                            borderColor: 'rgba(75, 192, 192, 1)',
                            backgroundColor: 'rgba(75, 192, 192, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1,
                            fill: true,
                            hidden: false
                        },
                        {
                            label: 'Right Motor Angle',
                            data: [],
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            borderWidth: 2,
                            pointRadius: 0,
                            tension: 0.1,
                            fill: true,
                            hidden: false
                        }
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            min: Y_MIN,
                            max: Y_MAX,
                            title: {
                                display: true,
                                text: 'Angle (degrees)'
                            }
                        }
                    }
                }
            });

            // График скорости
            speedChart = new Chart(speedCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Left Motor Speed (Raw)',
                            data: [],
                            borderColor: 'rgba(54, 162, 235, 1)',
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Right Motor Speed (Raw)',
                            data: [],
                            borderColor: 'rgba(255, 99, 132, 1)',
                            backgroundColor: 'rgba(255, 99, 132, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1
                        },
                        {
                            label: 'Left Motor Speed (Filtered)',
                            data: [],
                            borderColor: 'rgba(153, 102, 255, 1)',
                            backgroundColor: 'rgba(153, 102, 255, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            borderDash: [5, 5]
                        },
                        {
                            label: 'Right Motor Speed (Filtered)',
                            data: [],
                            borderColor: 'rgba(255, 159, 64, 1)',
                            backgroundColor: 'rgba(255, 159, 64, 0.1)',
                            borderWidth: 1.5,
                            pointRadius: 0,
                            tension: 0.1,
                            borderDash: [5, 5]
                        }
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            title: {
                                display: true,
                                text: 'Speed (deg/ms)'
                            }
                        }
                    }
                }
            });

            // График момента (мощности)
            torqueChart = new Chart(torqueCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [
                        {
                            label: 'Left Motor Torque',
                            data: [],
                            borderColor: 'rgba(255, 99, 71, 1)',
                            backgroundColor: 'rgba(255, 99, 71, 0.1)',
                            borderWidth: 1,
                            pointRadius: 0,
                            tension: 0.1,
                            fill: false
                        },
                        {
                            label: 'Right Motor Torque',
                            data: [],
                            borderColor: 'rgba(60, 179, 113, 1)',
                            backgroundColor: 'rgba(60, 179, 113, 0.1)',
                            borderWidth: 1,
                            pointRadius: 0,
                            tension: 0.1,
                            fill: false
                        }
                    ]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            title: {
                                display: true,
                                text: 'Torque'
                            },
                            min: -6,
                            max: 6,
                            ticks: {
                                stepSize: 1,
                                precision: 0
                            }
                        }
                    },
                    plugins: {
                        ...commonOptions.plugins,
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + context.raw.toFixed(2);
                                }
                            }
                        }
                    }
                }
            });
            // Плавный переход между страницами
            document.querySelectorAll('a[href^="/"]').forEach(anchor => {
                anchor.addEventListener('click', function(e) {
                    e.preventDefault();

                    // Создаем эффект перехода
                    const transition = document.createElement('div');
                    transition.className = 'page-transition';
                    document.body.appendChild(transition);

                    // Показываем переход
                    setTimeout(() => {
                        transition.style.opacity = '1';
                    }, 10);

                    // Переходим по ссылке после анимации
                    setTimeout(() => {
                        window.location.href = this.href;
                    }, 500);
                });
            });

            // Анимация кнопок при наведении
            document.querySelectorAll('.btn').forEach(btn => {
                btn.addEventListener('mouseenter', function() {
                    this.style.transform = 'translateY(-3px)';
                    this.style.boxShadow = '0 10px 20px rgba(0, 0, 0, 0.1)';
                });

                btn.addEventListener('mouseleave', function() {
                    this.style.transform = 'translateY(0)';
                    this.style.boxShadow = '0 5px 15px rgba(0, 0, 0, 0.1)';
                });
            });

            // Плавное появление элементов при загрузке
            document.addEventListener('DOMContentLoaded', function() {
                const elements = document.querySelectorAll('.container, .chart-container, .selection-controls, .time-controls, .upload-section');

                elements.forEach((el, index) => {
                    setTimeout(() => {
                        el.classList.add('fade-in');
                    }, index * 100);
                });
            });
            // Инициализация обработчика ползунка
            document.getElementById('timeRange').addEventListener('input', function() {
                timeWindow = parseInt(this.value);
                document.getElementById('timeWindowValue').textContent = timeWindow;
                updateTimeWindow();
            });
        }

        // Синхронизация масштабирования всех графиков
        function syncChartsZoom() {
            if (!angleChart || angleChart.data.labels.length === 0) return;

            const xScale = angleChart.scales.x;
            const newMin = xScale.min;
            const newMax = xScale.max;

            [speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    chart.options.scales.x.min = newMin;
                    chart.options.scales.x.max = newMax;
                    chart.update();
                }
            });
        }

        // Обновление временного окна
        function updateTimeWindow() {
            if (!angleChart || angleChart.data.labels.length === 0) return;

            const lastTime = angleChart.data.labels[angleChart.data.labels.length - 1];
            const newMin = Math.max(0, lastTime - timeWindow);
            const newMax = lastTime;

            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    chart.options.scales.x.min = newMin;
                    chart.options.scales.x.max = newMax;
                    chart.update();
                }
            });
        }

        // Автомасштабирование по времени
        function zoomToFit() {
            if (!angleChart || angleChart.data.labels.length === 0) return;

            maxDataTime = angleChart.data.labels[angleChart.data.labels.length - 1];
            timeWindow = maxDataTime;
            document.getElementById('timeRange').value = timeWindow;
            document.getElementById('timeWindowValue').textContent = timeWindow;

            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    chart.options.scales.x.min = 0;
                    chart.options.scales.x.max = maxDataTime;
                    chart.update();
                }
            });
        }

        // Функция переключения отображения данных на графиках
        function toggleDataset(chartType, datasetIndex) {
            let chart;
            let button;

            switch(chartType) {
                case 'angle':
                    chart = angleChart;
                    button = document.getElementById(`toggle${datasetIndex === 0 ? 'Left' : 'Right'}Angle`);
                    break;
                case 'speed':
                    chart = speedChart;
                    if(datasetIndex === 0) button = document.getElementById('toggleLeftSpeed');
                    else if(datasetIndex === 1) button = document.getElementById('toggleRightSpeed');
                    else if(datasetIndex === 2) button = document.getElementById('toggleLeftFiltered');
                    else button = document.getElementById('toggleRightFiltered');
                    break;
                case 'torque':
                    chart = torqueChart;
                    button = document.getElementById(`toggle${datasetIndex === 0 ? 'Left' : 'Right'}Torque`);
                    break;
            }

            if(chart && button) {
                const meta = chart.getDatasetMeta(datasetIndex);
                meta.hidden = !meta.hidden;
                chart.update();

                button.classList.toggle('active');
            }
        }
        function initSelection() { // функция выделения на графике зума
            const canvases = [
                document.getElementById('angles-chart'),
                document.getElementById('speed-chart'),
                document.getElementById('torque-chart')
            ];

            canvases.forEach(canvas => {
                canvas.addEventListener('mousedown', handleSelectionStart);
                canvas.addEventListener('mousemove', handleSelectionMove);
                canvas.addEventListener('mouseup', handleSelectionEnd);
                canvas.addEventListener('mouseleave', handleSelectionEnd);
            });

            document.getElementById('startSelection').addEventListener('click', () => {
                isSelecting = true;
                updateSelectionButtons();
            });

            document.getElementById('clearSelection').addEventListener('click', clearSelection);
        }

        function handleSelectionStart(e) {
            if (!isSelecting) return;

            const chart = getChartFromCanvas(e.target);
            if (!chart) return;

            const xValue = chart.scales.x.getValueForPixel(e.offsetX);
            selectionStart = xValue;
            selectionEnd = xValue;

            drawSelectionRect(chart);
        }

        function handleSelectionMove(e) {
            if (!isSelecting || selectionStart === null) return;

            const chart = getChartFromCanvas(e.target);
            if (!chart) return;

            selectionEnd = chart.scales.x.getValueForPixel(e.offsetX);
            drawSelectionRect(chart);
        }

        function handleSelectionEnd(e) {
            if (!isSelecting) return;

            const chart = getChartFromCanvas(e.target);
            if (!chart) return;

            // Автоматически применяем зум при отпускании мыши
            if (selectionStart !== null && selectionEnd !== null && Math.abs(selectionEnd - selectionStart) > 10) {
                zoomToSelection();
            }

            // Не очищаем выделение сразу, чтобы пользователь видел область
            setTimeout(clearSelection, 300);
        }

        function drawSelectionRect(chart) {
            if (selectionStart === null || selectionEnd === null) return;

            const ctx = chart.ctx;
            const xScale = chart.scales.x;
            const yScale = chart.scales.y;

            const startPixel = xScale.getPixelForValue(Math.min(selectionStart, selectionEnd));
            const endPixel = xScale.getPixelForValue(Math.max(selectionStart, selectionEnd));
            const width = endPixel - startPixel;

            // Очищаем предыдущий прямоугольник выделения
            chart.draw();

            // Рисуем новый прямоугольник выделения
            ctx.save();

            // Полупрозрачная заливка с градиентом
            const gradient = ctx.createLinearGradient(0, 0, 0, chart.height);
            gradient.addColorStop(0, 'rgba(75, 192, 192, 0.2)');
            gradient.addColorStop(1, 'rgba(75, 192, 192, 0.05)');

            ctx.fillStyle = gradient;
            ctx.strokeStyle = 'rgba(75, 192, 192, 0.8)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 3]);
            ctx.lineDashOffset = 0;

            // Скругленные углы
            const radius = 8;
            const yTop = 0;
            const yBottom = chart.height;

            ctx.beginPath();
            ctx.moveTo(startPixel + radius, yTop);
            ctx.lineTo(endPixel - radius, yTop);
            ctx.quadraticCurveTo(endPixel, yTop, endPixel, yTop + radius);
            ctx.lineTo(endPixel, yBottom - radius);
            ctx.quadraticCurveTo(endPixel, yBottom, endPixel - radius, yBottom);
            ctx.lineTo(startPixel + radius, yBottom);
            ctx.quadraticCurveTo(startPixel, yBottom, startPixel, yBottom - radius);
            ctx.lineTo(startPixel, yTop + radius);
            ctx.quadraticCurveTo(startPixel, yTop, startPixel + radius, yTop);
            ctx.closePath();

            ctx.fill();
            ctx.stroke();

            // Добавляем текст с размерами выделенной области
            const duration = (Math.max(selectionStart, selectionEnd) - Math.min(selectionStart, selectionEnd)).toFixed(0);
            ctx.fillStyle = 'rgba(75, 192, 192, 0.9)';
            ctx.font = 'bold 12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${duration} ms`, (startPixel + endPixel) / 2, 20);

            ctx.restore();
        }

       function zoomToSelection() { // выделение на графике
            if (selectionStart === null || selectionEnd === null) return;

            const min = Math.min(selectionStart, selectionEnd);
            const max = Math.max(selectionStart, selectionEnd);

            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    // Анимация плавного увеличения
                    const currentMin = chart.scales.x.min;
                    const currentMax = chart.scales.x.max;
                    const duration = 500; // 0.5 секунды

                    const startTime = performance.now();

                    const animateZoom = (timestamp) => {
                        const progress = Math.min((timestamp - startTime) / duration, 1);
                        const newMin = currentMin + (min - currentMin) * progress;
                        const newMax = currentMax + (max - currentMax) * progress;

                        chart.options.scales.x.min = newMin;
                        chart.options.scales.x.max = newMax;
                        chart.update();

                        if (progress < 1) {
                            requestAnimationFrame(animateZoom);
                        }
                    };

                    requestAnimationFrame(animateZoom);
                }
            });
       }

       function clearSelection() {
            isSelecting = false;
            selectionStart = null;
            selectionEnd = null;
            updateSelectionButtons();

            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) chart.draw();
            });
       }

       function updateSelectionButtons() {
            document.getElementById('startSelection').disabled = isSelecting;
            document.getElementById('zoomSelection').disabled = true;
       }

       function getChartFromCanvas(canvas) {
            if (canvas.id === 'angles-chart') return angleChart;
            if (canvas.id === 'speed-chart') return speedChart;
            if (canvas.id === 'torque-chart') return torqueChart;
            return null;
       }
        // Обновление всех графиков в реальном времени
       function updateAngles(left, right) {
            if (!angleChart || !speedChart || !torqueChart) return;

            const lastTime = angleChart.data.labels.length > 0
                ? angleChart.data.labels[angleChart.data.labels.length - 1] + TIME_STEP
                : 0;

            // Обновляем данные углов
            angleChart.data.labels.push(lastTime);
            angleChart.data.datasets[0].data.push(left);
            angleChart.data.datasets[1].data.push(right);

            // Рассчитываем скорости
            let leftSpeed = 0;
            let rightSpeed = 0;
            if (angleChart.data.datasets[0].data.length > 1) {
                const prevLeft = angleChart.data.datasets[0].data[angleChart.data.datasets[0].data.length - 2];
                const prevRight = angleChart.data.datasets[1].data[angleChart.data.datasets[1].data.length - 2];
                leftSpeed = (left - prevLeft) / TIME_STEP;
                rightSpeed = (right - prevRight) / TIME_STEP;
            }

            // Обновляем график скорости
            speedChart.data.labels.push(lastTime);
            speedChart.data.datasets[0].data.push(leftSpeed);
            speedChart.data.datasets[1].data.push(rightSpeed);

            // Простое сглаживание скоростей
            let filteredLeftSpeed = leftSpeed;
            let filteredRightSpeed = rightSpeed;
            if (speedChart.data.datasets[0].data.length > 1) {
                const windowSize = Math.min(15, speedChart.data.datasets[0].data.length);
                const startIdx = speedChart.data.datasets[0].data.length - windowSize;

                // Сглаживание для левого мотора
                const leftWindow = speedChart.data.datasets[0].data.slice(startIdx);
                filteredLeftSpeed = leftWindow.reduce((a, b) => a + b, 0) / leftWindow.length;

                // Сглаживание для правого мотора
                const rightWindow = speedChart.data.datasets[1].data.slice(startIdx);
                filteredRightSpeed = rightWindow.reduce((a, b) => a + b, 0) / rightWindow.length;
            }

            speedChart.data.datasets[2].data.push(filteredLeftSpeed);
            speedChart.data.datasets[3].data.push(filteredRightSpeed);

            // Рассчитываем момент для обоих моторов
            let leftTorque = 0;
            let rightTorque = 0;

            if (filteredLeftSpeed > 0.15) leftTorque = 5;
            else if (filteredLeftSpeed < -0.15) leftTorque = -5;

            if (filteredRightSpeed > 0.15) rightTorque = 5;
            else if (filteredRightSpeed < -0.15) rightTorque = -5;

            // Обновляем график момента
            torqueChart.data.labels.push(lastTime);
            torqueChart.data.datasets[0].data.push(leftTorque);
            torqueChart.data.datasets[1].data.push(rightTorque);

            maxDataTime = lastTime;

            // Поддерживаем фиксированное временное окно
            if (lastTime > timeWindow) {
                const newMin = lastTime - timeWindow;
                [angleChart, speedChart, torqueChart].forEach(chart => {
                    chart.options.scales.x.min = newMin;
                    chart.options.scales.x.max = lastTime;
                });
            }

            // Ограничиваем количество точек
            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart.data.labels.length > timeWindow / TIME_STEP) {
                    chart.data.labels.shift();
                    chart.data.datasets.forEach(dataset => dataset.data.shift());
                }
            });

            // Обновляем все графики
            angleChart.update('none');
            speedChart.update('none');
            torqueChart.update('none');
       }

        // Загрузка и отображение файла
       async function loadAndDisplayFile(filename) {
            const statusElement = document.getElementById('uploadStatus');
            statusElement.textContent = `Loading ${filename}...`;
            statusElement.style.color = "blue";

            try {
                const response = await fetch(`/file_data/${filename}`);
                if (!response.ok) throw new Error('Failed to load file');

                const result = await response.json();
                console.log("Loaded data:", result.data);
                if (!result.data || result.data.length === 0) {
                    throw new Error("File is empty or invalid format");
                }

                // Обработка данных
                const timestamps = [];
                const leftAngles = [];
                const rightAngles = [];
                const leftSpeeds = [];
                const rightSpeeds = [];
                const filteredLeftSpeeds = [];
                const filteredRightSpeeds = [];
                const leftTorques = [];
                const rightTorques = [];

                let prevLeft = result.data[0].left_angle;
                let prevRight = result.data[0].right_angle;

                result.data.forEach((item, index) => {
                    const time = index * TIME_STEP;
                    timestamps.push(time);

                    leftAngles.push(item.left_angle);
                    rightAngles.push(item.right_angle);

                    // Рассчитываем скорости
                    let leftSpeed = 0;
                    let rightSpeed = 0;
                    if (index > 0) {
                        leftSpeed = (item.left_angle - prevLeft) / TIME_STEP;
                        rightSpeed = (item.right_angle - prevRight) / TIME_STEP;
                        prevLeft = item.left_angle;
                        prevRight = item.right_angle;
                    }
                    leftSpeeds.push(leftSpeed);
                    rightSpeeds.push(rightSpeed);

                    // Сглаживание скоростей
                    let filteredLeftSpeed = leftSpeed;
                    let filteredRightSpeed = rightSpeed;
                    if (index > 0) {
                        const windowSize = Math.min(15, index);
                        const start = Math.max(0, index - windowSize);

                        // Сглаживание для левого мотора
                        const leftWindow = leftSpeeds.slice(start, index + 1);
                        filteredLeftSpeed = leftWindow.reduce((sum, val) => sum + val, 0) / leftWindow.length;

                        // Сглаживание для правого мотора
                        const rightWindow = rightSpeeds.slice(start, index + 1);
                        filteredRightSpeed = rightWindow.reduce((sum, val) => sum + val, 0) / rightWindow.length;
                    }
                    filteredLeftSpeeds.push(filteredLeftSpeed);
                    filteredRightSpeeds.push(filteredRightSpeed);

                    // Рассчитываем момент для обоих моторов
                    let leftTorque = 0;
                    let rightTorque = 0;

                    if (filteredLeftSpeed > 0.15) leftTorque = 5;
                    else if (filteredLeftSpeed < -0.15) leftTorque = -5;

                    if (filteredRightSpeed > 0.15) rightTorque = 5;
                    else if (filteredRightSpeed < -0.15) rightTorque = -5;

                    leftTorques.push(leftTorque);
                    rightTorques.push(rightTorque);
                });

                // Обновляем все графики
                angleChart.data.labels = timestamps;
                angleChart.data.datasets[0].data = leftAngles;
                angleChart.data.datasets[1].data = rightAngles;

                speedChart.data.labels = timestamps;
                speedChart.data.datasets[0].data = leftSpeeds;
                speedChart.data.datasets[1].data = rightSpeeds;
                speedChart.data.datasets[2].data = filteredLeftSpeeds;
                speedChart.data.datasets[3].data = filteredRightSpeeds;

                torqueChart.data.labels = timestamps;
                torqueChart.data.datasets[0].data = leftTorques;
                torqueChart.data.datasets[1].data = rightTorques;

                maxDataTime = timestamps.length > 0 ? timestamps[timestamps.length-1] : 0;

                // Автомасштабирование
                zoomToFit();

                document.getElementById('current-file').textContent = `Loaded: ${filename} (${result.data.length} points)`;
                statusElement.textContent = `Successfully loaded ${filename}`;
                statusElement.style.color = "green";

            } catch (error) {
                console.error("Error loading file:", error);
                statusElement.textContent = `Error: ${error.message}`;
                statusElement.style.color = "red";
            }
        }

        // Управление записью
       async function toggleRecording() {
            const response = await fetch('/toggle_recording', { method: 'POST' });
            const data = await response.json();
            isRecording = data.is_recording;

            const recordBtn = document.getElementById('record-btn');
            recordBtn.textContent = isRecording ? 'Stop Recording' : 'Start Recording';
            recordBtn.className = isRecording ? 'recording' : '';
       }

       // Загрузка данных через форму
       async function uploadDataFile() {
            const fileInput = document.getElementById('dataFile');
            const fileType = document.getElementById('fileType').value;
            const statusElement = document.getElementById('uploadStatus');

            if (!fileInput.files.length) {
                statusElement.textContent = "Please select a file first";
                statusElement.style.color = "red";
                return;
            }

            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);
            formData.append('file_type', fileType);

            try {
                statusElement.textContent = "Uploading...";
                statusElement.style.color = "#333";

                const response = await fetch('/upload_data_file', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    statusElement.textContent = `Success: ${result.filename} uploaded`;
                    statusElement.style.color = "green";
                    // Загружаем файл после успешной загрузки
                    setTimeout(() => loadAndDisplayFile(result.filename), 1000);
                } else {
                    statusElement.textContent = `Error: ${result.detail || 'Upload failed'}`;
                    statusElement.style.color = "red";
                }
            } catch (error) {
                statusElement.textContent = `Network error: ${error.message}`;
                statusElement.style.color = "red";
                console.error('Upload error:', error);
            }
       }

        // Функции управления графиком
       function resetZoom() {
            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    chart.resetZoom();
                    zoomToFit();
                }
            });
       }

       function zoomIn() {
            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) chart.zoom(1.2);
            });
       }

       function zoomOut() {
            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) chart.zoom(0.8);
            });
       }

       function panLeft() {
            [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    const { min, max } = chart.scales.x;
                    const range = max - min;
                    const newMin = Math.max(0, min - range * 0.2);
                    const newMax = Math.min(maxDataTime, max - range * 0.2);

                    if (newMin !== min || newMax !== max) {
                        chart.options.scales.x.min = newMin;
                        chart.options.scales.x.max = newMax;
                        chart.update();
                    }
                }
            });
       }

       function panRight() {
           [angleChart, speedChart, torqueChart].forEach(chart => {
                if (chart) {
                    const { min, max } = chart.scales.x;
                    const range = max - min;
                    const newMin = Math.max(0, min + range * 0.2);
                    const newMax = Math.min(maxDataTime, max + range * 0.2);

                    if (newMin !== min || newMax !== max) {
                        chart.options.scales.x.min = newMin;
                        chart.options.scales.x.max = newMax;
                        chart.update();
                    }
                }
           });
        }

       // Обработчик сообщений для загрузки файла из истории
       window.addEventListener('message', (event) => {
            if (event.data.type === 'load_file') {
                loadAndDisplayFile(event.data.filename);
            }
        });

       // Инициализация при загрузке страницы
       window.addEventListener('DOMContentLoaded', () => {
            initChart();
            initSelection();
        });

    </script>
</body>
