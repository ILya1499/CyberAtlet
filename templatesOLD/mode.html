<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Режимы и углы</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/EDbutton.css">
    <style>
        .angles-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 1rem;
        }
        .angles-table th,
        .angles-table td {
            padding: 16px;
            text-align: center;
            border: 1px solid #dee2e6;
        }
        .angles-table th {
            background-color: #f8f9fa;
            color: #495057;
            font-weight: 600;
        }
        .joint-cell {
            text-align: left;
            font-weight: 600;
            background-color: #f1f3f5;
            color: #343a40;
        }
        .angle-control {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .angle-slider {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            background: #ddd;
            border-radius: 3px;
            outline: none;
        }
        .angle-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #007bff;
            cursor: pointer;
            border: none;
        }
        .angle-value {
            font-weight: bold;
            color: #212529;
            min-width: 50px;
        }
        .angles-section {
            margin-top: 30px;
        }
        .angles-section h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #343a40;
        }
        /* Кнопки режимов */
        .mode-toggle-buttons {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            justify-content: center;
        }
        .mode-toggle-btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .mode-toggle-btn.load {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        .mode-toggle-btn.assist {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .mode-toggle-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .mode-toggle-btn.active {
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.5);
        }
        /* Скрытые блоки */
        .mode-content {
            display: none;
            margin-top: 20px;
        }
        .mode-content.active {
            display: block;
        }
        /* Заряд */
        #battery-display {
            font-size: 1.4rem;
            font-weight: bold;
        }
        #battery-status {
            font-size: 1rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Режимы и углы</h1>
            <nav>
                <!--button class="btn" onclick="location.href='/'">Main page</button>
                <button class="btn" onclick="location.href='/control'">Control motors</button>
                <button class="btn" onclick="location.href='/history'">View history</button>
                <button class="btn" onclick="location.href='/status'">Status</button>
                <button class="btn" onclick="location.href='/powerSaving'">Powersaving</button>
                <button class="btn" disabled>Mode</button-->
                <button 
                    class="btn" 
                    {% if request.url.path == '/' %}disabled{% else %}onclick="location.href='/'"{% endif %}>
                    Main page
                </button>
                <button 
                    class="btn" 
                    {% if request.url.path == '/control' %}disabled{% else %}onclick="location.href='/control'"{% endif %}>
                    Control motors
                </button>
                <button 
                    class="btn" 
                    {% if request.url.path == '/history' %}disabled{% else %}onclick="location.href='/history'"{% endif %}>
                    View History
                </button>
                <button 
                    class="btn" 
                    {% if request.url.path == '/status' %}disabled{% else %}onclick="location.href='/status'"{% endif %}>
                    Server status
                </button>
                <button 
                    class="btn" 
                    {% if request.url.path == '/powerSaving' %}disabled{% else %}onclick="location.href='/powerSaving'"{% endif %}>
                    Power saving
                </button>
                <button
                    class="btn" 
                    {% if request.url.path == '/mode' %}disabled{% else %}onclick="location.href='/mode'"{% endif %}>
                    Modes
                </button>
            </nav>
        </header>

        <!-- Заряд экзоскелета -->
        <div class="angles-section">
            <h2>Заряд экзоскелета</h2>
            <table class="angles-table">
                <thead>
                    <tr>
                        <th>Параметр</th>
                        <th>Уровень заряда</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="joint-cell">Заряд</td>
                        <td>
                            <div id="battery-display">0%</div>
                            <div id="battery-status">Экзоскелет не подключён</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Управление углами -->
        <div class="angles-section">
            <h2>Управление углами суставов</h2>
            <table class="angles-table">
                <thead>
                    <tr>
                        <th>Сустав</th>
                        <th>L (левый)</th>
                        <th>R (правый)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="joint-cell">Бедро</td>
                        <td>
                            <div class="angle-control">
                                <input type="range" class="angle-slider" id="hip-left-slider"
                                       min="-90" max="90" value="0" step="0.5"
                                       oninput="updateDisplayAngle('hip-left-val', this.value)">
                                <span class="angle-value" id="hip-left-val">0.0°</span>
                            </div>
                        </td>
                        <td>
                            <div class="angle-control">
                                <input type="range" class="angle-slider" id="hip-right-slider"
                                       min="-90" max="90" value="0" step="0.5"
                                       oninput="updateDisplayAngle('hip-right-val', this.value)">
                                <span class="angle-value" id="hip-right-val">0.0°</span>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td class="joint-cell">Колено</td>
                        <td>
                            <div class="angle-control">
                                <input type="range" class="angle-slider" id="knee-left-slider"
                                       min="0" max="120" value="0" step="0.5"
                                       oninput="updateDisplayAngle('knee-left-val', this.value)">
                                <span class="angle-value" id="knee-left-val">0.0°</span>
                            </div>
                        </td>
                        <td>
                            <div class="angle-control">
                                <input type="range" class="angle-slider" id="knee-right-slider"
                                       min="0" max="120" value="0" step="0.5"
                                       oninput="updateDisplayAngle('knee-right-val', this.value)">
                                <span class="angle-value" id="knee-right-val">0.0°</span>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="applyJoints()">Применить</button>
            </div>
        </div>

        <!-- Кнопки режимов (после таблицы с углами) -->
        <div class="angles-section">
            <h2>Режимы работы</h2>
            <div class="mode-toggle-buttons">
                <button class="mode-toggle-btn load" onclick="toggleMode('load')">Режим нагрузки</button>
                <button class="mode-toggle-btn assist" onclick="toggleMode('assist')">Режим усиления</button>
            </div>

            <!-- Блок нагрузки -->
            <div id="load-content" class="mode-content">
                <table class="angles-table">
                    <thead>
                        <tr>
                            <th>Параметр</th>
                            <th>Уровень</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="joint-cell">Нагрузка</td>
                            <td>
                                <div class="angle-control">
                                    <input type="range" class="angle-slider" id="load-slider"
                                        min="0" max="100" value="0" step="1"
                                        oninput="updateDisplayMode('load-val', this.value)">
                                    <span class="angle-value" id="load-val">0%</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="applyLoad()">Применить нагрузку</button>
                </div>
            </div>

            <!-- Блок усиления -->
            <div id="assist-content" class="mode-content">
                <table class="angles-table">
                    <thead>
                        <tr>
                            <th>Параметр</th>
                            <th>Уровень</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td class="joint-cell">Усиление</td>
                            <td>
                                <div class="angle-control">
                                    <input type="range" class="angle-slider assist-slider" id="assist-slider"
                                        min="0" max="100" value="0" step="1"
                                        oninput="updateDisplayMode('assist-val', this.value)">
                                    <span class="angle-value" id="assist-val">0%</span>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="btn" onclick="applyAssist()">Применить усиление</button>
                </div>
            </div>
        </div>
    </div>

    <script>

        // Применить нагрузку
        async function applyLoad() {
            const level = parseInt(document.getElementById('load-slider').value);

            try {
                const res = await fetch('/apply_load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level })
                });
                if (res.ok) {
                    console.log('Команда нагрузки отправлена на ESP32:', level);
                } else {
                    alert('Ошибка отправки команды нагрузки');
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
                alert('Нет связи с сервером');
            }
        }

        // Применить усиление
        async function applyAssist() {
            const level = parseInt(document.getElementById('assist-slider').value);

            try {
                const res = await fetch('/apply_assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level })
                });
                if (res.ok) {
                    console.log('Команда усиления отправлена на ESP32:', level);
                } else {
                    alert('Ошибка отправки команды усиления');
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
                alert('Нет связи с сервером');
            }
        }

        // Текущий активный режим
        let currentActiveMode = null;

        function toggleMode(mode) {
            const content = document.getElementById(mode + '-content');
            const button = event.target;

            if (currentActiveMode === mode) {
                // Если тот же режим — скрываем
                content.classList.remove('active');
                button.classList.remove('active');
                currentActiveMode = null;
            } else {
                // Скрываем предыдущий
                if (currentActiveMode) {
                    document.getElementById(currentActiveMode + '-content').classList.remove('active');
                    const prevBtn = document.querySelector(`.mode-toggle-btn[onclick*="${currentActiveMode}"]`);
                    if (prevBtn) prevBtn.classList.remove('active');
                }

                // Показываем новый
                content.classList.add('active');
                button.classList.add('active');
                currentActiveMode = mode;
            }
        }

        function updateDisplayAngle(elementId, value) {
            document.getElementById(elementId).textContent = parseFloat(value).toFixed(1) + '°';
        }

        function updateDisplayMode(elementId, value) {
            document.getElementById(elementId).textContent = parseFloat(value).toFixed(1) + '%';
        }

        // Функции управления Фиксировать изменение угла после ползунков и кнопки применить
        async function applyJoints() {
            const data = {
                hip_left: parseFloat(document.getElementById('hip-left-slider').value),
                hip_right: parseFloat(document.getElementById('hip-right-slider').value),
                knee_left: parseFloat(document.getElementById('knee-left-slider').value),
                knee_right: parseFloat(document.getElementById('knee-right-slider').value)
            };

            try {
                const res = await fetch('/apply_joints', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(data)
                });
                if (res.ok) {
                    console.log('Команда отправлена на ESP32:', data);
                } else {
                    alert('Ошибка отправки команды');
                }
            } catch (e) {
                console.error('Ошибка сети:', e);
                alert('Нет связи с сервером');
            }
        }

        async function updateLoadLevel(value) {
            document.getElementById('load-val').textContent = value + '%';
            try {
                await fetch('/update_load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: parseInt(value) })
                });
            } catch (e) {
                console.error('Ошибка нагрузки:', e);
            }
        }

        async function updateAssistLevel(value) {
            document.getElementById('assist-val').textContent = value + '%';
            try {
                await fetch('/update_assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: parseInt(value) })
                });
            } catch (e) {
                console.error('Ошибка усиления:', e);
            }
        }

        // WebSocket
        const ws = new WebSocket("ws://95.163.230.7:8000/ws");
        ws.onmessage = function(event) {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "status") {
                    const data = msg.data;

                    // Заряд
                    const battery = data.battery_percent || 0;
                    const batteryEl = document.getElementById('battery-display');
                    const statusEl = document.getElementById('battery-status');
                    batteryEl.textContent = Math.round(battery) + '%';
                    if (data.esp32_connected) {
                        statusEl.textContent = 'Экзоскелет подключён';
                        statusEl.style.color = '#28a745';
                        batteryEl.style.color = battery < 20 ? '#e74c3c' : battery < 50 ? '#f39c12' : '#2ecc71';
                    } else {
                        batteryEl.textContent = '0%';
                        batteryEl.style.color = '#6c757d';
                        statusEl.textContent = 'Экзоскелет не подключён';
                        statusEl.style.color = '#dc3545';
                    }

                    // Углы
                    const joints = ['hip_left', 'hip_right', 'knee_left', 'knee_right'];
                    joints.forEach(j => {
                        const val = data[j] ?? 0;
                        const id = j.replace('_', '-');
                        document.getElementById(`${id}-slider`).value = val;
                        document.getElementById(`${id}-val`).textContent = val.toFixed(1) + '°';
                    });

                    // Режимы (обновляем ползунки, если они видны)
                    document.getElementById('load-slider').value = data.load_level || 0;
                    document.getElementById('load-val').textContent = (data.load_level || 0) + '%';
                    document.getElementById('assist-slider').value = data.assist_level || 0;
                    document.getElementById('assist-val').textContent = (data.assist_level || 0) + '%';
                }
            } catch (e) {
                console.error("Ошибка WebSocket:", e);
            }
        };
    </script>
</body>
</html>
