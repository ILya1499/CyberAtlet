<!DOCTYPE html>
<html lang="ru">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Режимы работы</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link rel="stylesheet" href="/static/EDbutton.css">
    <style>
        .mode-btn.mode-load    { background-color: #e74c3c; }
        .mode-btn.mode-assist  { background-color: #2ecc71; }
        .mode-btn.mode-charge  { background-color: #bccc2e; }
        
        .modes {
            display: flex;
            /* flex-direction: column; */
            gap: 32px; /* ← увеличено расстояние */
            margin-top: 20px;
        }
        

    </style>
</head>
<body>
    <header>
        <h1>Режимы работы</h1>
        <nav>
            <button 
                class="btn" 
                {% if request.url.path == '/' %}disabled{% else %}onclick="location.href='/'"{% endif %}>
                Main page
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/control' %}disabled{% else %}onclick="location.href='/control'"{% endif %}>
                Control motors
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/history' %}disabled{% else %}onclick="location.href='/history'"{% endif %}>
                View History
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/status' %}disabled{% else %}onclick="location.href='/status'"{% endif %}>
                Server status
            </button>
            <button 
                class="btn" 
                {% if request.url.path == '/powerSaving' %}disabled{% else %}onclick="location.href='/powerSaving'"{% endif %}>
                Power saving
            </button>
            <button
                class="btn" 
                {% if request.url.path == '/mode' %}disabled{% else %}onclick="location.href='/mode'"{% endif %}>
                Modes
            </button>
        </nav>
    </header>
    <!-- Таблица с углами -->
    <!-- Таблица с встроенными регуляторами -->
    <div class="angles-section">
        <h2>Управление углами суставов</h2>
        <table class="angles-table">
            <thead>
                <tr>
                    <th>Сустав</th>
                    <th>L (левый)</th>
                    <th>R (правый)</th>
                </tr>
            </thead>
            <tbody>
                <!-- Бедро -->
                <tr>
                    <td class="joint-cell">Бедро</td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider" id="hip-left-slider"
                                   min="-90" max="90" value="0" step="0.5"
                                   oninput="updateJoint('hip_left', this.value)">
                            <span class="angle-value" id="hip-left-val">0.0°</span>
                        </div>
                    </td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider" id="hip-right-slider"
                                   min="-90" max="90" value="0" step="0.5"
                                   oninput="updateJoint('hip_right', this.value)">
                            <span class="angle-value" id="hip-right-val">0.0°</span>
                        </div>
                    </td>
                </tr>
                <!-- Колено -->
                <tr>
                    <td class="joint-cell">Колено</td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider" id="knee-left-slider"
                                    min="0" max="120" value="0" step="0.5"
                                   oninput="updateJoint('knee_left', this.value)">
                            <span class="angle-value" id="knee-left-val">0.0°</span>
                        </div>
                    </td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider" id="knee-right-slider"
                                   min="0" max="120" value="0" step="0.5"
                                   oninput="updateJoint('knee_right', this.value)">
                            <span class="angle-value" id="knee-right-val">0.0°</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Таблица: Режим нагрузки -->
    <div class="angles-section">
        <table class="angles-table">
            <thead>
                <tr>
                    <th>Режим нагрузки</th>
                    <th>Уровень нагрузки</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="joint-cell">Нагрузка</td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider" id="load-slider"
                                min="0" max="100" value="0" step="1"
                                oninput="updateLoadLevel(this.value)">
                            <span class="angle-value" id="load-val">0%</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Таблица: Режим усиления -->
    <div class="angles-section">
        <table class="angles-table">
            <thead>
                <tr>
                    <th>Режим усиления</th>
                    <th>Уровень усиления</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="joint-cell">Усиление</td>
                    <td>
                        <div class="angle-control">
                            <input type="range" class="angle-slider assist-slider" id="assist-slider"
                                min="0" max="100" value="0" step="1"
                                oninput="updateAssistLevel(this.value)">
                            <span class="angle-value" id="assist-val">0%</span>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Заряд с индикацией подключения -->
    <div class="angles-section">
        <h2>Заряд экзоскелета</h2>
        <div id="battery-status" style="text-align: center; padding: 20px;">
            <div>
                <span id="battery-percent" style="font-size: 2rem; font-weight: bold;">0%</span>
            </div>
            <div id="battery-connection-status" style="margin-top: 10px; font-size: 1.1rem; color: #6c757d;">
                Экзоскелет не подключён
            </div>
        </div>
    </div>
    
    <script>
        // Отправка на сервер
        async function updateJoint(joint, value) {
            const displayId = joint.replace('_', '-') + '-val';
            document.getElementById(displayId).textContent = parseFloat(value).toFixed(1) + '°';

            // Собираем все значения
            const data = {
                hip_left: document.getElementById('hip-left-slider').value,
                hip_right: document.getElementById('hip-right-slider').value,
                knee_left: document.getElementById('knee-left-slider').value,
                knee_right: document.getElementById('knee-right-slider').value
            };

            try {
                await fetch('/update_joints', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(data)
                });
            } catch (e) {
                console.error('Ошибка отправки:', e);
            }
        }
        // Обновление уровня нагрузки
        async function updateLoadLevel(value) {
            // Обновляем отображение
            document.getElementById('load-val').textContent = value + '%';
            
            // Отправляем на сервер
            try {
                await fetch('/update_load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: parseInt(value) })
                });
            } catch (e) {
                console.error('Ошибка отправки нагрузки:', e);
            }
        }
        // Обновление уровня усиления
        async function updateAssistLevel(value) {
            document.getElementById('assist-val').textContent = value + '%';
            try {
                await fetch('/update_assist', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ level: parseInt(value) })
                });
            } catch (e) {
                console.error('Ошибка отправки усиления:', e);
            }
        }

        // Обновление из WebSocket
        const ws = new WebSocket("ws://95.163.230.7:8000/ws");
        ws.onmessage = function(event) {
            try {
                const msg = JSON.parse(event.data);
                if (msg.type === "status") {
                    const d = msg.data;

                    const percentEl = document.getElementById('battery-percent');
                    const statusEl = document.getElementById('battery-connection-status');

                    if (data.esp32_connected) {
                        // ESP32 подключён — показываем реальный заряд
                        const percent = Math.round(data.battery_percent || 0);
                        percentEl.textContent = percent + '%';
                        percentEl.style.color = 
                            percent < 20 ? '#e74c3c' : 
                            percent < 50 ? '#f39c12' : '#2ecc71';
                        statusEl.textContent = 'Экзоскелет подключён';
                        statusEl.style.color = '#28a745';
                    } else {
                        // ESP32 отключён
                        percentEl.textContent = '0%';
                        percentEl.style.color = '#6c757d';
                        statusEl.textContent = 'Экзоскелет не подключён';
                        statusEl.style.color = '#dc3545';
                    }
                    
                    //Код обновления нагрузки
                    const load = msg.data.load_level || 0;
                    document.getElementById('load-slider').value = load;
                    document.getElementById('load-val').textContent = load + '%';

                    // Режим усиления ← НОВОЕ
                    const assist = data.assist_level || 0;
                    document.getElementById('assist-slider').value = assist;
                    document.getElementById('assist-val').textContent = assist + '%';

                    
                    // Обновляем значения и ползунки
                    const joints = ['hip_left', 'hip_right', 'knee_left', 'knee_right'];
                    joints.forEach(j => {
                        const val = d[j] ?? 0;
                        const id = j.replace('_', '-');
                        document.getElementById(`${id}-slider`).value = val;
                        document.getElementById(`${id}-val`).textContent = val.toFixed(1) + '°';
                    });
                }
            } catch (e) {
                console.error("Ошибка WebSocket:", e);
            }
        };
    </script>
        
</body>
</html>
